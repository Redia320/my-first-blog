<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fff1f4" />
  <title>大切なお知らせ</title>
  <style>
    :root {
      --bg1: #fff8f2;
      --bg2: #ffe8ee;
      --text: #3c2b2f;
      --muted: #7a5d64;
      --accent: #ff7893;
      --accent-dark: #d94f70;
      --card: rgba(255, 255, 255, 0.86);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.9), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255,220,230,.9), transparent 26%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", system-ui, sans-serif;
      color: var(--text);
      text-align: center;
      overflow: hidden;
      padding: 24px;
    }

    .card {
      position: relative;
      width: min(92vw, 440px);
      padding: 42px 28px 36px;
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 70px rgba(184, 94, 118, 0.2);
      border: 1px solid rgba(255,255,255,.75);
      animation: fadeIn 1s ease both;
      z-index: 2;
    }

    .label {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      background: #fff1f4;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .05em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(24px, 6vw, 30px);
      line-height: 1.45;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
    }

    button {
      appearance: none;
      margin-top: 28px;
      padding: 15px 30px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8fa3, #ff6f91);
      color: white;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .04em;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(255, 120, 147, 0.36);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    button:active { transform: scale(.98); }
    button:hover { transform: translateY(-2px); box-shadow: 0 18px 34px rgba(255, 120, 147, 0.44); }

    .hidden { display: none; }

    .message { animation: reveal .9s ease both; }

    .baby {
      font-size: 64px;
      margin-bottom: 14px;
      animation: float 1.8s ease-in-out infinite;
    }

    .main-message {
      margin: 10px 0 18px;
      color: var(--accent-dark);
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 900;
      line-height: 1.35;
    }

    .sub-message {
      color: #5f454d;
      font-size: 17px;
      line-height: 2;
    }

    .footer {
      margin-top: 22px;
      color: #9a7982;
      font-size: 13px;
    }

    .piece {
      position: fixed;
      top: -30px;
      font-size: 22px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes reveal {
      from { opacity: 0; transform: scale(.94); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <section id="before">
      <div class="label">SPECIAL MESSAGE</div>
      <h1>お父さん、お母さんへ</h1>
      <p>
        今日は、ふたりに<br />
        どうしても伝えたいことがあります。
      </p>
      <button type="button" onclick="showMessage()">ここを押してね</button>
    </section>

    <section id="after" class="hidden message">
      <div class="baby">👶</div>
      <div class="main-message">赤ちゃんを<br />授かりました</div>
      <p class="sub-message">
        まだ小さな命ですが、<br />
        私たちのところに来てくれました。<br /><br />
        これから、<br />
        おじいちゃん・おばあちゃんに<br />
        なってください。
      </p>
      <div class="footer">with love</div>
    </section>
  </main>

  <script>
    function showMessage() {
      document.getElementById('before').classList.add('hidden');
      document.getElementById('after').classList.remove('hidden');
      for (let i = 0; i < 44; i++) setTimeout(createPiece, i * 38);
    }

    function createPiece() {
      const piece = document.createElement('div');
      const items = ['♡', '💗', '🌸', '✨'];
      piece.className = 'piece';
      piece.textContent = items[Math.floor(Math.random() * items.length)];
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.animationDuration = (3 + Math.random() * 2.8) + 's';
      piece.style.fontSize = (16 + Math.random() * 18) + 'px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 6500);
    }
  </script>
</body>
</html>
