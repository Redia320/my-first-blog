<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fff1f4" />
  <title>大切なお知らせ</title>
  <style>
    :root{--bg1:#fff9f3;--bg2:#ffe8ef;--text:#3c2b2f;--muted:#7b6068;--soft:#fff4f7;--accent:#ff7893;--accent-dark:#d94f70;--card:rgba(255,255,255,.86)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 18% 16%,rgba(255,255,255,.95),transparent 28%),radial-gradient(circle at 88% 18%,rgba(255,225,232,.92),transparent 28%),radial-gradient(circle at 50% 92%,rgba(255,239,210,.75),transparent 30%),linear-gradient(135deg,var(--bg1),var(--bg2));font-family:"Hiragino Sans","Yu Gothic","YuGothic",system-ui,sans-serif;color:var(--text);text-align:center;overflow:hidden;padding:24px}.orb{position:fixed;border-radius:999px;filter:blur(2px);opacity:.55;animation:drift 10s ease-in-out infinite alternate;pointer-events:none}.one{width:130px;height:130px;background:#ffd4df;left:-35px;top:12%}.two{width:95px;height:95px;background:#fff0be;right:-20px;bottom:14%;animation-delay:1.2s}.three{width:70px;height:70px;background:#ffddeb;right:12%;top:10%;animation-delay:.6s}.card{position:relative;width:min(92vw,460px);min-height:560px;padding:30px 28px 28px;border-radius:34px;background:var(--card);backdrop-filter:blur(18px);box-shadow:0 26px 80px rgba(184,94,118,.22);border:1px solid rgba(255,255,255,.82);animation:fadeIn 1s ease both;z-index:2;display:flex;flex-direction:column;justify-content:space-between}.top{min-height:400px;display:grid;place-items:center}.slide{display:none;animation:reveal .8s ease both}.slide.active{display:block}.label{display:inline-block;padding:7px 14px;border-radius:999px;background:var(--soft);color:var(--accent-dark);font-size:12px;font-weight:800;letter-spacing:.08em;margin-bottom:18px}.tiny{color:#a9868e;font-size:13px;font-weight:700;letter-spacing:.06em;margin-bottom:12px}h1{margin:0 0 16px;font-size:clamp(25px,6vw,32px);line-height:1.42}p{margin:0;color:var(--muted);font-size:16px;line-height:1.95}.icon{font-size:58px;margin-bottom:16px;animation:float 1.9s ease-in-out infinite}.main-message{margin:10px 0 18px;color:var(--accent-dark);font-size:clamp(28px,7.4vw,38px);font-weight:900;line-height:1.34}.sub-message{color:#5f454d;font-size:17px;line-height:2}.closing-message{color:#5f454d;font-size:14px;line-height:1.9}.signature{display:inline-block;margin-top:16px;padding:10px 24px 0;border-top:1px dashed rgba(217,79,112,.35);color:var(--accent-dark);font-size:14px;font-weight:800;letter-spacing:.12em}.photo-label{margin-bottom:12px;color:var(--accent-dark);font-size:14px;font-weight:800;letter-spacing:.06em}.baby-photo{display:block;width:min(100%,350px);margin:auto;border:7px solid rgba(255,255,255,.95);border-radius:24px;box-shadow:0 18px 38px rgba(141,113,93,.2);transform:rotate(-1deg)}.photo-note{margin-top:12px;color:#9a7982;font-size:13px;font-weight:700}.date-box{margin:22px auto 0;padding:15px 18px;width:min(100%,320px);border-radius:22px;background:rgba(255,244,247,.9);border:1px solid rgba(255,160,180,.28);color:#6b4d55;line-height:1.8;font-weight:700}.date-box span{display:block;color:var(--accent-dark);font-size:15px}.progress{display:flex;justify-content:center;gap:8px;margin-bottom:18px}.dot{width:8px;height:8px;border-radius:999px;background:#efd1d8;transition:width .25s ease,background .25s ease}.dot.active{width:24px;background:var(--accent)}button{appearance:none;width:100%;padding:16px 22px;border:0;border-radius:999px;background:linear-gradient(135deg,#ff8fa3,#ff6f91);color:white;font-size:16px;font-weight:900;letter-spacing:.04em;cursor:pointer;box-shadow:0 14px 28px rgba(255,120,147,.36);transition:transform .2s ease,box-shadow .2s ease}button:active{transform:scale(.985)}button:hover{transform:translateY(-2px);box-shadow:0 18px 34px rgba(255,120,147,.44)}.letter{margin-top:20px;padding-top:18px;border-top:1px dashed rgba(217,79,112,.24);color:#9a7982;font-size:13px;line-height:1.8}.piece{position:fixed;top:-30px;font-size:22px;pointer-events:none;animation:fall linear forwards;z-index:1}@media(max-height:700px){body{padding:12px}.card{min-height:calc(100vh - 24px);padding:20px 24px}.top{min-height:360px}.baby-photo{width:min(100%,300px)}}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes reveal{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}@keyframes drift{from{transform:translateY(0) translateX(0)}to{transform:translateY(18px) translateX(14px)}}
  </style>
</head>
<body>
  <div class="orb one"></div><div class="orb two"></div><div class="orb three"></div>
  <main class="card" aria-live="polite">
    <div class="top">
      <section class="slide active"><div class="label">SPECIAL MESSAGE</div><h1>お父さん、お母さん</h1><p>ふたりに、<br>大切な報告があります。</p></section>
      <section class="slide"><div class="icon">💌</div><div class="tiny">大切なお知らせ</div><h1>無事、映美の体に<br>子供を授かって<br>心拍を確認しました。</h1></section>
      <section class="slide"><div class="photo-label">いま、すくすく成長中です</div><img class="baby-photo" src="assets/baby-progress.png" alt="妊娠6週2日、予定日まで236日の成長記録"><div class="photo-note">小さな命が、一生懸命育っています。</div></section>
      <section class="slide"><div class="icon">🧸</div><p class="sub-message">まだ安定期には入ってないので<br>心配なこともありますが、<br>今のところ順調です。</p><div class="date-box"><span>予定日は2月4日</span>無事に生まれてくるのが楽しみです。</div></section>
      <section class="slide"><div class="icon">👶</div><div class="main-message">温かく<br>見守ってください</div><p class="closing-message">お父さん、お母さんのように<br>尊敬できる両親になれるように、<br>夫婦で協力しながら<br>立派な子供に育てますので、<br>温かく見守ってください。</p><div class="signature">あきと　えみ　より</div></section>
    </div>
    <div><div class="progress" aria-hidden="true"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><button id="nextButton" type="button" onclick="nextSlide()">開いてみる</button></div>
  </main>
  <script>
    let current=0;const slides=[...document.querySelectorAll('.slide')],dots=[...document.querySelectorAll('.dot')],button=document.getElementById('nextButton'),labels=['開いてみる','次へ','成長の記録を見る','もう少しだけ進む','お知らせを見る'];function nextSlide(){if(current>=slides.length-1){burst(34);return}slides[current].classList.remove('active');dots[current].classList.remove('active');current+=1;slides[current].classList.add('active');dots[current].classList.add('active');button.textContent=labels[current]||'もう一度お祝いする';if(current===slides.length-1){button.textContent='もう一度お祝いする';burst(70)}else{burst(14)}}function burst(count){for(let i=0;i<count;i++)setTimeout(createPiece,i*28)}function createPiece(){const piece=document.createElement('div'),items=['♡','💗','🌸','✨','🫧'];piece.className='piece';piece.textContent=items[Math.floor(Math.random()*items.length)];piece.style.left=Math.random()*100+'vw';piece.style.animationDuration=3+Math.random()*2.8+'s';piece.style.fontSize=16+Math.random()*18+'px';document.body.appendChild(piece);setTimeout(()=>piece.remove(),6500)}
  </script>
</body>
</html>
